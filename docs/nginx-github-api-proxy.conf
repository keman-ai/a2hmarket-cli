# GitHub API 代理（供 install.sh / a2hmarket-cli update 获取 releases/latest，避免直连 api.github.com 的 rate limit）
# 在现有 /github/ 同 server 内增加以下 location，请求形如：
#   https://a2hmarket.ai/github/api/repos/keman-ai/a2hmarket-cli/releases/latest

location /github/api/ {
    proxy_pass https://api.github.com/;
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_set_header Host api.github.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
}
