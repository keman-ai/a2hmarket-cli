# GitHub 代理（供 install.sh / a2hmarket-cli update 使用，避免国内直连 GitHub 超时或限流）
# 在 a2hmarket.ai 的 server 块内添加以下两个 location。

# ── 1. API 代理：获取 releases/latest ──
# 请求示例：https://a2hmarket.ai/github/api/repos/keman-ai/a2hmarket-cli/releases/latest
location /github/api/ {
    proxy_pass https://api.github.com/;
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_set_header Host api.github.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
}

# ── 2. Release 下载代理：下载二进制 ──
# 请求示例：https://a2hmarket.ai/github/keman-ai/a2hmarket-cli/releases/download/v1.1.16/a2hmarket-cli_darwin_arm64.tar.gz
# GitHub release 下载会 302 到 objects.githubusercontent.com，需要 proxy_redirect 跟随
location /github/ {
    # 排除 /github/api/ 的请求（已被上面的 location 匹配）
    proxy_pass https://github.com/;
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_set_header Host github.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 跟随 GitHub 的 302 重定向到实际下载地址
    proxy_intercept_errors off;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
}
